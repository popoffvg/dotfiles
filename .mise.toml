[env]
GIT_SSH_COMMAND = "ssh -i ~/.ssh/id_ed25519"
FIRECRAWL_API_KEY = "fc-6369ed54b3374805af4b30196cd98c83"

[tools]
neovim = "latest"
go = "1.25.9"

[tasks.openrouter-env]
description = "Print export command for OPENROUTER_API_KEY from macOS Keychain"
run = "echo \"export OPENROUTER_API_KEY=$(security find-generic-password -s OPENROUTER_API_KEY -w 2>/dev/null)\""

[tasks.openrouter-check]
description = "Check if OPENROUTER_API_KEY is available in current shell"
run = "[ -n \"$OPENROUTER_API_KEY\" ] && echo OPENROUTER_API_KEY=SET || echo OPENROUTER_API_KEY=NOT_SET"

[tasks.stow]
description = "Stow everything: repo → ~, harness/claude → ~/.claude, zsh+git (dotfiles) → ~"
depends = ["harness:plugins:sync"]
run = [
  "stow --target=$HOME --dir={{config_root}}/.. --restow {{ config_root | basename }}",
  "stow --target=$HOME/.claude --dir={{config_root}}/harness --restow claude",
  "stow --dotfiles --target=$HOME --dir={{config_root}} --restow zsh",
  "stow --dotfiles --target=$HOME --dir={{config_root}} --restow git",
]

[tasks.unstow]
description = "Unstow everything"
run = [
  "stow --target=$HOME --dir={{config_root}}/.. --delete {{ config_root | basename }}",
  "stow --target=$HOME/.claude --dir={{config_root}}/harness --delete claude",
  "stow --dotfiles --target=$HOME --dir={{config_root}} --delete zsh",
  "stow --dotfiles --target=$HOME --dir={{config_root}} --delete git",
]

[tasks."harness:plugins:sync"]
description = "Regenerate local-plugins marketplace + plugin symlinks"
sources = ["harness/plugins/*/claude/.claude-plugin/plugin.json"]
outputs = ["harness/claude/plugins/local-plugins/.claude-plugin/marketplace.json"]
run = "bash {{config_root}}/harness/scripts/sync-marketplace.sh"

[settings]
env_shell_expand = true
