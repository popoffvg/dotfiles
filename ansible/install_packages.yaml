# yaml-language-server: $schema= https://raw.githubusercontent.com/ansible/schemas/main/f/ansible.json

- name: Setup laptop
  hosts: all
  vars:
    dotfiles_dir: "{{ ansible_env.HOME }}/Documents/git/dotfiles"
    nb: /opt/nanobrew/prefix/bin/nb
    brew_packages:
      # shell
      - zsh-autosuggestions
      - zsh-completions
      - zsh-syntax-highlighting
      - fzf
      - fzf-tab
      - atuin
      - starship
      - direnv
      # tools
      - bat
      - entr
      - eza
      - zoxide
      - grc
      - jq
      - fd
      - sd
      - yq
      - ripgrep
      - delta
      - tldr
      - stow
      - gh
      - dua-cli
      - broot
      - viu
      - sq
      - sk
      - pamburus/tap/hl
      - difftastic
      - patchutils
      - dust
      - procs
      - htop
      - tree
      - wget
      - hurl
      - grpcurl
      - grpcui
      - yazi
      - ast-grep
      - lazygit
      - lazydocker
      - rtk
      - worktrunk
      - gentleman-programming/tap/engram
      # dev
      - mise
      - go
      - nodejs
      - neovim
      - helix
      - kubectl
      - helm
      - k3d
      - kind
      - k9s
      - ansible
      # git
      - lefthook
      - gitleaks
      - jj
      # terminal
      - zellij
      # apps
      - hiddenbar
    brew_casks:
      - ghostty
      - amazon-q
      - claude-code
      - visual-studio-code
      - obsidian
      - slack
      - telegram
      - stats
      - alt-tab
      - raycast
      - zed
      - google-chrome
    home_symlinks:
      - .zshrc
      - .zshrc_aliases
      - .zshrc_broot
      - .zshrc_fish
      - .zshrc_git
      - .zshrc_go
      - .zshrc_atuin
      - .zshrc_mise
      - .zshrc_sq
      - .zshrc_starship
      - .zshrc_zoxide
      - .mise.toml
      - cspell.json
    config_symlinks:
      - nvim
      - ghostty
      - direnv
      - zellij
      - helix
      - starship.toml
      - atuin

  tasks:
    # --- nanobrew (nb) ---
    - name: Install nanobrew
      ansible.builtin.shell:
        cmd: curl -fsSL https://nanobrew.trilok.ai/install | bash
        creates: "{{ nb }}"

    - name: Symlink nb as brew
      ansible.builtin.file:
        src: "{{ nb }}"
        dest: /opt/nanobrew/prefix/bin/brew
        state: link

    # Loop one-per-formula: `nb install <list>` aborts the whole batch if any
    # single name fails dependency resolution.
    - name: Install packages
      ansible.builtin.command:
        cmd: "{{ nb }} install {{ item }}"
      loop: "{{ brew_packages }}"
      register: nb_pkg
      changed_when: "'Already installed' not in nb_pkg.stdout"

    # Casks install in one command: nanobrew continues past individual
    # failures, and warm casks exit 1 with "refusing to overwrite".
    - name: Install casks
      ansible.builtin.command:
        cmd: "{{ nb }} install --cask {{ brew_casks | join(' ') }}"
      register: nb_cask
      changed_when: "'Installing' in nb_cask.stdout"
      failed_when: false

    - name: Install nerd font
      ansible.builtin.command:
        cmd: "{{ nb }} install --cask font-fira-mono-nerd-font"
      register: nb_font
      changed_when: "'Installing' in nb_font.stdout"
      failed_when: false

    - name: Install git-split-diffs globally via npm
      ansible.builtin.shell:
        cmd: npm install -g git-split-diffs
      changed_when: false

    - name: Install television
      ansible.builtin.shell:
        cmd: curl -fsSL https://alexpasmantier.github.io/television/install.sh | bash
      args:
        creates: "{{ ansible_env.HOME }}/.local/bin/tv"

    - name: Install fff-mcp (fast file search MCP server)
      ansible.builtin.shell:
        cmd: curl -fsSL https://raw.githubusercontent.com/dmtrKovalenko/fff/main/install-mcp.sh | bash
      args:
        creates: "{{ ansible_env.HOME }}/.local/bin/fff-mcp"

    # --- zinit (zsh plugin manager) ---
    - name: Install zinit
      ansible.builtin.git:
        repo: https://github.com/zdharma-continuum/zinit.git
        dest: "{{ ansible_env.HOME }}/.local/share/zinit/zinit.git"
        depth: 1
      register: zinit_install
      changed_when: zinit_install.changed

    # --- Shell ---
    - name: Set zsh as default shell
      ansible.builtin.shell:
        cmd: chsh -s /bin/zsh
      changed_when: false

    - name: Fix brew share permissions for compinit
      ansible.builtin.file:
        path: /opt/homebrew/share
        mode: "0755"

    # --- macOS system settings ---
    - name: Apply macOS defaults
      ansible.builtin.command:
        cmd: ./macos.sh
        chdir: "{{ dotfiles_dir }}/macos"
      changed_when: false

    # --- Symlinks: home ---
    - name: Symlink dotfiles to home
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/{{ item }}"
        dest: "{{ ansible_env.HOME }}/{{ item }}"
        state: link
        force: true
      loop: "{{ home_symlinks }}"

    # --- Symlinks: ~/.config ---
    - name: Ensure ~/.config exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config"
        state: directory
        mode: "0755"

    - name: Symlink config dirs
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/.config/{{ item }}"
        dest: "{{ ansible_env.HOME }}/.config/{{ item }}"
        state: link
        force: true
      loop: "{{ config_symlinks }}"

    # --- Git scripts ---
    - name: Find git scripts
      ansible.builtin.find:
        paths: "{{ dotfiles_dir }}"
        patterns: "git_*.sh"
      register: git_scripts

    - name: Symlink git scripts to home
      ansible.builtin.file:
        src: "{{ item.path }}"
        dest: "{{ ansible_env.HOME }}/{{ item.path | basename }}"
        state: link
        force: true
      loop: "{{ git_scripts.files }}"

    # --- Mise ---
    - name: Install mise
      ansible.builtin.shell:
        cmd: "curl https://mise.run | sh"
        creates: "{{ ansible_env.HOME }}/.local/bin/mise"

    - name: Install mise tools
      ansible.builtin.shell:
        cmd: "{{ ansible_env.HOME }}/.local/bin/mise install"
        chdir: "{{ ansible_env.HOME }}"
      changed_when: false

    # --- Git hooks (global) ---
    - name: Ensure ~/.config/git exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config/git"
        state: directory
        mode: "0755"

    - name: Symlink global git hooks
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/.config/git/hooks"
        dest: "{{ ansible_env.HOME }}/.config/git/hooks"
        state: link
        force: true

    - name: Set global git hooks path
      ansible.builtin.shell:
        cmd: git config --global core.hooksPath ~/.config/git/hooks
      changed_when: false

    # --force: lefthook refuses to sync into a custom global core.hooksPath by
    # default. We want its shims in the global dir alongside the hand-written hooks.
    - name: Install lefthook hooks into global hooks path
      ansible.builtin.command:
        cmd: lefthook install --force
        chdir: "{{ dotfiles_dir }}"
      changed_when: false

    # --- Raycast extensions ---
    - name: Find Raycast extensions
      ansible.builtin.find:
        paths: "{{ dotfiles_dir }}/raycast"
        file_type: directory
        recurse: false
      register: raycast_extensions

    - name: Install Raycast extension dependencies
      ansible.builtin.command:
        cmd: npm install
        chdir: "{{ item.path }}"
      loop: "{{ raycast_extensions.files }}"
      register: raycast_npm
      changed_when: "'added' in raycast_npm.stdout"

    - name: Build Raycast extensions
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ item.path }}"
      loop: "{{ raycast_extensions.files }}"
      changed_when: false

    # --- Cleanup zcompdump ---
    - name: Remove stale zcompdump
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ansible_env.HOME }}/.zcompdump"
        - "{{ ansible_env.HOME }}/.zcompdump.zwc"
